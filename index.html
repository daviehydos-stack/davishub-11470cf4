<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="language" content="English" />

    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="5-4cL4v0omMLhQHTpS5n_YJFvJrYSSNaY-kzAtSEjZY" />
    
    <!-- Default Meta Description - React Helmet will override per page -->
    <meta name="description" content="Azani Internet Service Provider Project. KCSE 2026 Computer Project. Documentation and Database Available. Free KCSE 2026 Project. Milestone 1 and Milestone 2 Available." />
    
    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    
    <!-- Default title - React Helmet will override per page -->
    <title>Azani Internet Service Provider Project | KCSE 2026 Computer Project</title>
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.azaniispproject.co.ke/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.azaniispproject.co.ke/" />
    <meta property="og:title" content="Azani Internet Service Provider Project | KCSE 2026 Computer Project" />
    <meta property="og:description" content="Azani Internet Service Provider Project. KCSE 2026 Computer Project. Documentation and Database Available. Free KCSE 2026 Project. Milestone 1 and Milestone 2 Available." />
    <meta property="og:image" content="https://www.azaniispproject.co.ke/meta.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Azani ISP Project" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.azaniispproject.co.ke/" />
    <meta name="twitter:title" content="Azani Internet Service Provider Project | KCSE 2026 Computer Project" />
    <meta name="twitter:description" content="Azani Internet Service Provider Project. KCSE 2026 Computer Project. Documentation and Database Available. Free KCSE 2026 Project. Milestone 1 and Milestone 2 Available." />
    <meta name="twitter:image" content="https://www.azaniispproject.co.ke/meta.jpg" />
    
    <!-- CRITICAL: Preconnect to origins BEFORE everything else (saves 300ms+) -->
    <link rel="preconnect" href="https://rijticcpybvwmndengvu.supabase.co" />
    <link rel="dns-prefetch" href="//rijticcpybvwmndengvu.supabase.co" />
    <link rel="preconnect" href="https://img.youtube.com" />
    <link rel="dns-prefetch" href="//img.youtube.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload hero background image (CRITICAL for LCP) -->
    <link rel="preload" as="image" href="/hero-background.webp" fetchpriority="high" />
    
    <!-- Google Fonts with display=swap for non-blocking -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
    
    <!-- Inline Critical CSS for instant hero render -->
    <style>
      /* Critical CSS - renders hero before React loads */
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Prevent layout shift from fonts loading */
      * {
        font-display: swap;
      }
      
      /* Loading placeholder - prevents blank screen */
      #loading-placeholder {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: linear-gradient(135deg, #0a0f1e 0%, #1a1f3a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      #loading-placeholder.loaded {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Loading placeholder (removed when React loads) -->
    <div id="loading-placeholder">
      <div style="text-align: center; color: #fff;">
        <h1 style="font-size: 1.5rem; margin-bottom: 1rem;">Azani ISP Project</h1>
        <p style="opacity: 0.7;">Loading...</p>
      </div>
    </div>
    
    <div id="root"></div>
    
    <!-- Remove loading placeholder when React mounts -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var loader = document.getElementById('loading-placeholder');
          if (loader) loader.classList.add('loaded');
        }, 100);
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
